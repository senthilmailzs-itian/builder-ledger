<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Builder Ledger - Login</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/mobile-responsive.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .app-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .app-logo h1 {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .app-logo p {
            color: #764ba2;
            font-size: 14px;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
        }

        .btn-login:hover {
            opacity: 0.9;
            color: white;
        }

        .role-selector {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .role-selector label {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="app-logo">
                <img src="assets/img/dream builders.png" alt="Dream Builders Logo" height="60" class="mb-3 bg-white rounded p-2 shadow-sm">
                <h4 class="fw-bold mb-1" style="color: #667eea;">Dream Builders, Thiruvarur</h4>
                <h5 class="fw-bold" style="color: #764ba2;">Builder Ledger 🏗️</h5>
                <p class="text-muted small mt-2">Construction Finance Tracker</p>
            </div>

        <form>
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" placeholder="Enter username" value="admin">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter password" value="••••••••">
            </div>

            <div class="role-selector">
                <label>Select Role to Demo:</label>
                <div class="d-grid gap-2">
                    <a href="admin-dashboard.html" class="btn btn-outline-primary btn-sm">
                        👤 Login as ADMIN
                    </a>
                    <a href="accountant-dashboard.html" class="btn btn-outline-success btn-sm">
                        📝 Login as ACCOUNTANT
                    </a>
                    <a href="viewer-dashboard.html" class="btn btn-outline-info btn-sm">
                        👁️ Login as REPORT_VIEWER
                    </a>
                </div>
            </div>

            <div class="d-grid mt-4">
                <button type="button" class="btn btn-login"
                    onclick="alert('This is a static mockup. Please select a role above to navigate.')">
                    Login
                </button>
            </div>
        </form>

        <div class="text-center mt-4">
            <a href="index.html" class="text-muted small">← Back to Navigator</a>
        </div>
    </div>
    </div>


    <!-- Global Footer -->
    <footer class="mt-auto py-3 text-center text-muted small" style="background-color: #f8f9fa; border-top: 1px solid #dee2e6; width: 100%;">
        <div class="container d-flex flex-column align-items-center">
            <div class="mb-2 d-flex align-items-center justify-content-center flex-wrap">
                <span class="me-2 mb-1">&copy; 2026 Dream Builders, Thiruvarur. Software by</span>
                <img src="assets/img/Dheeran OneClick Logo.png" alt="Dheeran OneClick Logo" height="60" class="d-inline-block align-middle mb-1">
            </div>
            <p class="mb-0 fst-italic text-secondary" style="font-size: 0.85rem;">"Think Simple, Use Simple"</p>
        </div>
    </footer>

    <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
